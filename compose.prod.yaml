services:
  server:
    build:
      context: .
      target: runtime
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_TAG: ${GIT_TAG:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    # Option B: Use pre-built image from GHCR (comment out "build" above and uncomment below)
    # image: ghcr.io/babarot/oksskolten:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/data/rss.db
      RSS_BRIDGE_URL: http://rss-bridge:80
      FLARESOLVERR_URL: http://flaresolverr:8191
      FLARESOLVERR_CONCURRENCY: "0"
      FETCH_CONCURRENCY: "5"
      PARSE_MAX_THREADS: "2"
      CRON_SCHEDULE: "*/5 * * * *"
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      VLLM_BASE_URL: http://host.docker.internal:8000
    env_file:
      - path: .env
        required: false
    volumes:
      - ${DATA_DIR:-./data}:/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      rss-bridge:
        condition: service_started
      flaresolverr:
        condition: service_started
      meilisearch:
        condition: service_healthy
    networks:
      - internal

  meilisearch:
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    ports: !override []

  rss-bridge:
    ports: !override []

  flaresolverr:
    ports: !override []

  cloudflared:
    image: cloudflare/cloudflared
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    networks:
      - internal
    restart: unless-stopped
