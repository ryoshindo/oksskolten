name: Coverage Badge

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]

jobs:
  update-badges:
    name: Update Coverage Badges
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: read
    steps:
      - name: Check artifacts exist
        id: check
        run: |
          SERVER=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${WORKFLOW_RUN_ID}/artifacts" --jq '[.artifacts[] | select(.name=="server-coverage")] | length')
          CLIENT=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${WORKFLOW_RUN_ID}/artifacts" --jq '[.artifacts[] | select(.name=="client-coverage")] | length')
          if [[ "$SERVER" == "0" || "$CLIENT" == "0" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No coverage artifacts found (tests were likely skipped). Skipping badge update."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: steps.check.outputs.skip != 'true'
        with:
          name: server-coverage
          path: artifacts/server
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: steps.check.outputs.skip != 'true'
        with:
          name: client-coverage
          path: artifacts/client
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract coverage percentages
        if: steps.check.outputs.skip != 'true'
        run: |
          SERVER_PCT=$(jq '.total.lines.pct' artifacts/server/coverage-summary.json)
          CLIENT_PCT=$(jq '.total.lines.pct' artifacts/client/coverage-summary.json)
          echo "SERVER_PCT=$SERVER_PCT" >> "$GITHUB_ENV"
          echo "CLIENT_PCT=$CLIENT_PCT" >> "$GITHUB_ENV"

      - name: Update server coverage badge
        if: steps.check.outputs.skip != 'true'
        uses: Schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 7de3479899077c477335584e14d51adc
          filename: oksskolten-server-coverage.json
          label: server coverage
          message: ${{ env.SERVER_PCT }}%
          valColorRange: ${{ env.SERVER_PCT }}
          minColorRange: 0
          maxColorRange: 100

      - name: Update client coverage badge
        if: steps.check.outputs.skip != 'true'
        uses: Schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 7de3479899077c477335584e14d51adc
          filename: oksskolten-client-coverage.json
          label: client coverage
          message: ${{ env.CLIENT_PCT }}%
          valColorRange: ${{ env.CLIENT_PCT }}
          minColorRange: 0
          maxColorRange: 100
