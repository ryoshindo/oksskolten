name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - 'eslint.config.js'
            docs:
              - 'docs/spec/**'
              - 'docs/guides/**'
              - 'docs/adr/**'
              - 'policy/**'
              - 'scripts/lint-docs.sh'
            client:
              - 'src/**'
              - 'shared/**'
              - 'vite.config.ts'
              - 'tailwind.config.ts'
              - 'postcss.config.js'
              - 'index.html'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - 'eslint.config.js'

  check:
    name: Typecheck & Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true' || needs.detect-changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  server-test:
    name: Server Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run server tests
        run: npx vitest run --project server --coverage.enabled --coverage.reporter=json-summary --coverage.reportsDirectory=coverage/server

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: server-coverage
          path: coverage/server/coverage-summary.json
          retention-days: 30

      - name: Download base coverage
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@8a338493df3d275e4a7a63bcff3b8fe97e51a927 # v19
        with:
          name: server-coverage
          path: coverage/server-base
          branch: main
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: Check base coverage exists
        if: github.event_name == 'pull_request'
        id: check-base
        run: |
          if [ -f coverage/server-base/coverage-summary.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Coverage Report
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2.9.3
        with:
          name: Server Coverage
          json-summary-path: coverage/server/coverage-summary.json
          json-summary-compare-path: ${{ steps.check-base.outputs.exists == 'true' && 'coverage/server-base/coverage-summary.json' || '' }}

  client-test:
    name: Client Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run client tests
        run: npx vitest run --project client --coverage.enabled --coverage.reporter=json-summary --coverage.reportsDirectory=coverage/client
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: client-coverage
          path: coverage/client/coverage-summary.json
          retention-days: 30

      - name: Download base coverage
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@8a338493df3d275e4a7a63bcff3b8fe97e51a927 # v19
        with:
          name: client-coverage
          path: coverage/client-base
          branch: main
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: Check base coverage exists
        if: github.event_name == 'pull_request'
        id: check-base
        run: |
          if [ -f coverage/client-base/coverage-summary.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Coverage Report
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2.9.3
        with:
          name: Client Coverage
          json-summary-path: coverage/client/coverage-summary.json
          json-summary-compare-path: ${{ steps.check-base.outputs.exists == 'true' && 'coverage/client-base/coverage-summary.json' || '' }}

  lint-docs:
    name: Docs Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install conftest
        run: |
          curl -fsSL -o /tmp/conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v0.65.0/conftest_0.65.0_Linux_x86_64.tar.gz
          echo "67f54077f51405558420e26b227a641c62c010fbc3bd168bca3a450a2541d32c  /tmp/conftest.tar.gz" | sha256sum -c -
          tar xz -C /usr/local/bin conftest -f /tmp/conftest.tar.gz
          rm /tmp/conftest.tar.gz

      - run: npm ci

      - name: Verify Rego tests
        run: |
          conftest verify --policy policy/spec
          conftest verify --policy policy/guides
          conftest verify --policy policy/adr

      - name: Lint docs
        run: bash scripts/lint-docs.sh

  ci-gate:
    name: CI Gate
    if: always()
    needs: [check, server-test, client-test, lint-docs]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Check results
        run: |
          results=("${CHECK_RESULT}" "${SERVER_TEST_RESULT}" "${CLIENT_TEST_RESULT}" "${LINT_DOCS_RESULT}")
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "Job failed with result: $r"
              exit 1
            fi
          done
        env:
          CHECK_RESULT: ${{ needs.check.result }}
          SERVER_TEST_RESULT: ${{ needs.server-test.result }}
          CLIENT_TEST_RESULT: ${{ needs.client-test.result }}
          LINT_DOCS_RESULT: ${{ needs.lint-docs.result }}
