services:
  meilisearch:
    image: getmeili/meilisearch:v1.13
    restart: unless-stopped
    environment:
      MEILI_DB_PATH: /meili_data
      MEILI_LOG_LEVEL: WARN
    volumes:
      - meili_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  rss-bridge:
    image: rssbridge/rss-bridge:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - internal

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
    ports:
      - "8191:8191"
    networks:
      - internal

volumes:
  meili_data:

networks:
  internal:
    driver: bridge
